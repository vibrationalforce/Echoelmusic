# =============================================================================
# ECHOELMUSIC - XCODEGEN PROJECT CONFIGURATION
# =============================================================================
# DAW + Video Production — iOS
# =============================================================================

name: Echoelmusic

options:
  bundleIdPrefix: com.echoelmusic
  xcodeVersion: "26.2"
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: $(TARGET_NAME)
    MARKETING_VERSION: "7.0.0"
    CURRENT_PROJECT_VERSION: "${BUILD_NUMBER:=1}"
    ENABLE_BITCODE: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    SWIFT_OPTIMIZATION_LEVEL: "-O"
    GCC_OPTIMIZATION_LEVEL: "s"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_INCLUDE_ALL_APP_ICON_ASSETS: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_OPTIMIZATION_LEVEL: "0"
      DEBUG_INFORMATION_FORMAT: "dwarf"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      OTHER_SWIFT_FLAGS: "$(inherited) -Xfrontend -warn-long-function-bodies=200 -Xfrontend -warn-long-expression-type-checking=200"
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_COMPILATION_MODE: "wholemodule"

# =============================================================================
# TARGETS
# =============================================================================

targets:

  # ===========================================================================
  # iOS App (iPhone + iPad) — DAW + Video
  # ===========================================================================
  Echoelmusic:
    type: application
    platform: iOS
    sources:
      - path: Sources/Echoelmusic
        type: group
        excludes:
          - "**/*.md"
    resources:
      - path: Sources/Echoelmusic/Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
        type: file
    info:
      path: Resources/iOS/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Echoelmusic
        LSRequiresIPhoneOS: true

        # === Privacy Strings (ITMS-90683 compliance) ===
        NSMicrophoneUsageDescription: "Echoelmusic uses your microphone to capture audio for bio-reactive processing and voice-to-music transformation."
        NSHealthShareUsageDescription: "Echoelmusic reads your heart rate and HRV data to create bio-reactive audio experiences that respond to your body."
        NSHealthUpdateUsageDescription: "Echoelmusic may save your meditation and coherence training sessions to HealthKit."
        NSCameraUsageDescription: "Echoelmusic uses your camera for face tracking to control audio parameters with your facial expressions."
        NSFaceIDUsageDescription: "Echoelmusic uses TrueDepth camera for face tracking to map your expressions to audio-visual parameters."
        NSBluetoothAlwaysUsageDescription: "Echoelmusic connects to Bluetooth MIDI controllers and audio devices for professional music creation."
        NSBluetoothPeripheralUsageDescription: "Echoelmusic connects to Bluetooth MIDI controllers for music creation."
        NSLocalNetworkUsageDescription: "Echoelmusic uses local network for DMX lighting control, Art-Net, and connecting to external audio interfaces."
        NSHomeKitUsageDescription: "Echoelmusic connects to HomeKit accessories for bio-reactive smart lighting control synchronized with your music."
        NSLocationWhenInUseUsageDescription: "Echoelmusic uses your location to discover nearby DMX lighting fixtures and network audio devices."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Echoelmusic uses your location to discover nearby DMX lighting fixtures and network audio devices."
        NSMotionUsageDescription: "Echoelmusic uses motion data for gesture-based audio control and spatial audio head tracking."
        NSEyeTrackingUsageDescription: "Echoelmusic uses eye tracking for immersive gaze-based audio control on supported devices."
        NSPhotoLibraryUsageDescription: "Echoelmusic can save visualizations, session screenshots, and captured photos to your photo library."
        NSPhotoLibraryAddUsageDescription: "Echoelmusic can save generated art, captured photos, and recorded video to your photo library."

        # === Networking ===
        NSBonjourServices:
          - "_http._tcp"
          - "_rtsp._tcp"
          - "_artnet._udp"
          - "_osc._udp"
          - "_midi._udp"
          - "_echoelmusic._tcp"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

        # === Background Modes ===
        UIBackgroundModes:
          - audio
          - bluetooth-central
          - bluetooth-peripheral

        # === UI Configuration ===
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        UIRequiresFullScreen: false
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_NAME: Echoelmusic
        PRODUCT_BUNDLE_IDENTIFIER: com.echoelmusic.app
        INFOPLIST_FILE: Resources/iOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Echoelmusic.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APP_ICON_ASSETS: YES
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: all
    dependencies: []
    entitlements:
      path: Echoelmusic.entitlements

# =============================================================================
# SCHEMES
# =============================================================================

schemes:
  Echoelmusic:
    build:
      targets:
        Echoelmusic: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
