# =============================================================================
# ECHOELMUSIC - QUICK TEST WORKFLOW
# =============================================================================
# Runs fast tests on Linux (cheapest runner: $0.008/min)
# Use this for everyday commits - saves ~90% vs full builds
# =============================================================================

name: "⚡ Quick Test"

on:
  workflow_dispatch:
  push:
    branches: [develop, 'claude/**']  # develop + Claude feature branches
    paths:
      - 'Sources/**/*.swift'
      - 'Tests/**/*.swift'
      - 'Package.swift'

jobs:
  swift-test:
    name: "🧪 Swift Tests"
    runs-on: ubuntu-latest  # Linux = $0.008/min (10x cheaper than macOS!)
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Cache Swift
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-swift-

      - name: Swift Version
        run: swift --version

      - name: Build (Linux)
        run: swift build

      - name: Run Tests
        run: swift test

      - name: "✅ Tests Passed"
        run: echo "All Swift tests passed!"

  lint:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -r "AKIA\|sk-\|password\s*=\s*['\"]" --include="*.swift" --include="*.kt" . || echo "No secrets found"

      - name: "✅ Lint Passed"
        run: echo "Code quality checks passed!"

  summary:
    name: "📊 Test Summary"
    needs: [swift-test, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Results
        run: |
          echo "================================"
          echo "  QUICK TEST RESULTS"
          echo "================================"
          echo "Swift:   ${{ needs.swift-test.result }}"
          echo "Lint:    ${{ needs.lint.result }}"
          echo "================================"
          echo ""
          echo "💡 This was a QUICK test (~$0.05)"
          echo "   For full platform builds, use:"
          echo "   '🚀 Release All Platforms' workflow"
