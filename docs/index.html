    <style>
        @font-face {
            font-family: 'Atkinson Hyperlegible';
            src: url('fonts/atkinson-regular.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Atkinson Hyperlegible';
            src: url('fonts/atkinson-bold.woff2') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Atkinson Hyperlegible', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #000;
            color: #e0e0e0;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        a { color: inherit; text-decoration: none; }
        a:focus-visible { outline: 2px solid #e0e0e0; outline-offset: 2px; }
        ::selection { background: rgba(224,224,224,0.3); color: #fff; }

        .logo {
            margin-bottom: 32px;
            opacity: 0;
            animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
        }
        .logo svg { width: 80px; height: 80px; }

        .name {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 12px;
            opacity: 0;
            animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
        }

        .tagline {
            font-size: clamp(14px, 2.5vw, 18px);
            color: rgba(224,224,224,0.55);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 48px;
            opacity: 0;
            animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
        }

        .social {
            display: flex;
            gap: 16px;
            opacity: 0;
            animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
        }

        .social a {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(224,224,224,0.55);
            transition: color 0.2s, transform 0.2s;
        }
        .social a:hover {
            color: #e0e0e0;
            transform: translateY(-2px);
        }
        .social a svg { width: 22px; height: 22px; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 12px;
            color: rgba(224,224,224,0.3);
        }
        .footer a {
            color: rgba(224,224,224,0.3);
            transition: color 0.2s;
        }
        .footer a:hover { color: rgba(224,224,224,0.55); }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
            .logo, .name, .tagline, .social { opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>
